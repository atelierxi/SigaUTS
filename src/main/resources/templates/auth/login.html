<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión – SigaUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body class="bg-uts d-flex align-items-center justify-content-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">

            <div class="card shadow-lg border-0 rounded-4">

                <!-- Cabecera -->
                <div class="card-header bg-uts-verde text-white text-center py-4 rounded-top-4">
                    <h4 class="mb-0 fw-bold">SigaUTS</h4>
                    <small class="opacity-75">Sistema Integrado de Gestión Académica</small>
                </div>

                <div class="card-body px-4 py-4">

                    <!-- Mensaje de error -->
                    <div th:if="${mensajeError}"
                         class="alert alert-danger alert-dismissible fade show d-flex align-items-center"
                         role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${mensajeError}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Mensaje de logout -->
                    <div th:if="${mensajeLogout}"
                         class="alert alert-success alert-dismissible fade show d-flex align-items-center"
                         role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span th:text="${mensajeLogout}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!--
                        th:action="@{/login}" genera la URL e inyecta el token CSRF.
                        name="correo"     → debe coincidir con .usernameParameter("correo")
                        name="contrasena" → debe coincidir con .passwordParameter("contrasena")
                    -->
                    <form th:action="@{/login}" method="post" id="formLogin" novalidate>

                        <div class="mb-3">
                            <label for="correo" class="form-label fw-semibold">
                                <i class="bi bi-envelope me-1"></i>Correo institucional
                            </label>
                            <input type="email"
                                   id="correo"
                                   name="correo"
                                   class="form-control form-control-lg"
                                   placeholder="usuario@uts.edu.co"
                                   autocomplete="username"
                                   required autofocus>
                            <div class="invalid-feedback">Ingrese un correo válido.</div>
                        </div>

                        <div class="mb-3">
                            <label for="contrasena" class="form-label fw-semibold">
                                <i class="bi bi-lock me-1"></i>Contraseña
                            </label>
                            <div class="input-group">
                                <input type="password"
                                       id="contrasena"
                                       name="contrasena"
                                       class="form-control form-control-lg"
                                       placeholder="••••••••"
                                       autocomplete="current-password"
                                       required>
                                <button class="btn btn-outline-secondary"
                                        type="button" id="togglePassword">
                                    <i class="bi bi-eye" id="iconoOjo"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback">Ingrese su contraseña.</div>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" id="recuerdame"
                                   name="remember-me" class="form-check-input">
                            <label for="recuerdame" class="form-check-label text-muted small">
                                Recordar mi sesión
                            </label>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-uts-verde btn-lg fw-semibold"
                                    id="btnIngresar">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                            </button>
                        </div>

                    </form>
                </div>

                <div class="card-footer text-center text-muted small py-3 rounded-bottom-4">
                    <i class="bi bi-shield-lock me-1"></i>Acceso protegido – UTS &copy; 2026
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Mostrar / ocultar contraseña
    document.getElementById('togglePassword').addEventListener('click', function () {
        const input = document.getElementById('contrasena');
        const icono = document.getElementById('iconoOjo');
        if (input.type === 'password') {
            input.type = 'text';
            icono.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icono.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });

    // Validación y spinner al enviar
    document.getElementById('formLogin').addEventListener('submit', function (e) {
        if (!this.checkValidity()) { e.preventDefault(); e.stopPropagation(); }
        this.classList.add('was-validated');
        if (this.checkValidity()) {
            const btn = document.getElementById('btnIngresar');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verificando...';
            btn.disabled = true;
        }
    });
</script>
</body>
</html>
