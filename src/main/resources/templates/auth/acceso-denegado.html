<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado – SigaUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
<div class="text-center px-4">
    <i class="bi bi-shield-x text-danger" style="font-size:5rem;"></i>
    <h1 class="fw-bold mt-3">Acceso Denegado</h1>
    <p class="text-muted">
        No tienes permisos para acceder a esta página.
        <span th:if="${nombreUsuario}">
            (<strong th:text="${nombreUsuario}"></strong>)
        </span>
    </p>
    <a th:href="@{/dashboard}" class="btn btn-success px-4 me-2">
        <i class="bi bi-house me-1"></i>Ir a mi panel
    </a>
    <form th:action="@{/logout}" method="post" class="d-inline">
        <button type="submit" class="btn btn-outline-secondary px-4">
            <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
