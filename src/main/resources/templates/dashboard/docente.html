<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente – SigaUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --uts-verde: #6ab023; --uts-verde-dark: #558d1c; }
        .navbar-uts { background: linear-gradient(135deg, var(--uts-verde), var(--uts-verde-dark)); }
        .card-modulo { transition: transform .2s, box-shadow .2s; border: none; border-radius: 1rem; }
        .card-modulo:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
        .icon-modulo { font-size: 2.5rem; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark navbar-uts px-4 py-2">
    <span class="navbar-brand fw-bold fs-5">
        <i class="bi bi-mortarboard-fill me-2"></i>SigaUTS
    </span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white small">
            <i class="bi bi-person-circle me-1"></i>
            <span sec:authentication="name">docente@uts.edu.co</span>
        </span>
        <span class="badge bg-primary rounded-pill" th:text="${rol}">Docente</span>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Salir
            </button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="mb-5">
        <h2 class="fw-bold"><i class="bi bi-person-workspace me-2 text-primary"></i>Panel del Docente</h2>
        <p class="text-muted">Bienvenido, <strong th:text="${nombreUsuario}"></strong>.</p>
    </div>

    <div class="row g-4">

        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card card-modulo shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <div class="icon-modulo text-success mb-3"><i class="bi bi-pencil-square"></i></div>
                    <h5 class="fw-bold">Calificaciones</h5>
                    <p class="text-muted small">Ingresar y editar notas por corte (RF07)</p>
                    <a href="/docente/calificaciones" class="btn btn-success btn-sm px-4">
                        <i class="bi bi-arrow-right me-1"></i>Ingresar notas
                    </a>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card card-modulo shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <div class="icon-modulo text-primary mb-3"><i class="bi bi-journal-bookmark-fill"></i></div>
                    <h5 class="fw-bold">Mis Materias</h5>
                    <p class="text-muted small">Materias asignadas por período (RF04)</p>
                    <a href="/docente/materias" class="btn btn-primary btn-sm px-4">
                        <i class="bi bi-arrow-right me-1"></i>Ver materias
                    </a>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card card-modulo shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <div class="icon-modulo text-info mb-3"><i class="bi bi-calendar3"></i></div>
                    <h5 class="fw-bold">Mi Horario</h5>
                    <p class="text-muted small">Consultar horario de clases (RF05)</p>
                    <a href="/docente/horario" class="btn btn-info btn-sm px-4 text-white">
                        <i class="bi bi-arrow-right me-1"></i>Ver horario
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
